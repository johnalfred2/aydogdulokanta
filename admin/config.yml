backend:
  name: github
  repo: johnalfred2/aydogdulokanta
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Site İçeriği"
    files:
      - name: "all"
        label: "Tüm İçerik"
        file: "data.json"
        fields:
          - label: "Restoran Bilgileri"
            name: "restaurant"
            widget: "object"
            fields:
              - { label: "Restoran Adı", name: "name", widget: "string" }
              - { label: "Yıl Rozeti", name: "sinceBadge", widget: "string" }
              - { label: "Etiket", name: "tagline", widget: "string" }
              - { label: "Açıklama", name: "description", widget: "text" }
              - { label: "Menü Butonu", name: "ctaMenu", widget: "string" }
              - { label: "Telefon", name: "phone", widget: "string" }
              - { label: "Video (Masaüstü)", name: "heroVideoDesktop", widget: "string", required: false }
              - { label: "Video (Mobil)", name: "heroVideoMobile", widget: "string", required: false }

          - label: "Menü Kategorileri"
            name: "categories"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Kategori Adı", name: "name", widget: "string" }
              - { label: "İkon", name: "icon", widget: "string" }
              - { label: "Fotoğraf", name: "image", widget: "image" }
              - label: "Ürünler"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ürün Adı", name: "name", widget: "string" }
                  - { label: "Açıklama", name: "description", widget: "text" }
                  - { label: "Fiyat ₺", name: "price", widget: "number" }
                  - { label: "Özel Etiket", name: "featuredLabel", widget: "string", required: false }

          - label: "Çalışma Saatleri"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Gün", name: "day", widget: "string" }
              - { label: "Saat", name: "hours", widget: "string" }

          - label: "İletişim"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Adres", name: "address", widget: "text" }
              - { label: "Maps Linki", name: "mapsUrl", widget: "string" }
              - { label: "Telefon", name: "phone", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "Facebook", name: "facebook", widget: "string", required: false }
              - { label: "Twitter", name: "twitter", widget: "string", required: false }
