<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CMS - AYDOĞDU LOKANTASI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #2C1810; margin-bottom: 24px; }
    h2 { color: #8B1A1A; margin: 24px 0 12px; border-bottom: 1px solid #ddd; padding-bottom: 6px; }
    .section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    label { display: block; font-size: 0.85rem; color: #666; margin: 10px 0 4px; }
    input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 0.9rem; }
    textarea { min-height: 60px; resize: vertical; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .row > div.sm { flex: 0 0 120px; }
    .row > div.xs { flex: 0 0 50px; }
    .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
    .item-row:last-child { border-bottom: none; }
    .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .cat-header label { margin: 0; }
    .hour-row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
    .hour-row label { flex: 0 0 100px; margin: 0; }
    .hour-row input { flex: 1; }
    .btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #8B1A1A; color: #fff; }
    .btn-primary:hover { background: #6B1010; }
    .btn-block { width: 100%; margin-top: 16px; }
    .status { padding: 10px; margin: 12px 0; border-radius: 4px; display: none; }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .status.info { background: #d1ecf1; color: #0c5460; display: block; }
    .login-box { max-width: 400px; margin: 120px auto; background: #fff; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .login-box h2 { border: none; color: #2C1810; }
    .login-box input { margin-bottom: 12px; }
  </style>
</head>
<body>

  <div id="login" class="login-box" style="display:none">
    <h2>AYDO\u011eDU CMS</h2>
    <p style="margin-bottom:16px;color:#666;">GitHub Token ile giri\u015f yap\u0131n</p>
    <input type="password" id="token-input" placeholder="github_pat_...">
    <button class="btn btn-primary btn-block" onclick="saveToken()">Giri\u015f Yap</button>
    <p style="margin-top:12px;font-size:0.8rem;color:#888;">Token taray\u0131c\u0131da saklan\u0131r.</p>
  </div>

  <div id="editor" class="container" style="display:none">
    <h1>AYDO\u011eDU LOKANTASI - CMS</h1>
    <div id="status" class="status"></div>

    <div class="section">
      <h2>Restoran Bilgileri</h2>
      <label>Y\u0131l Rozeti</label>
      <input id="r-badge" placeholder="1990'dan Beri">
      <label>Etiket (Tagline)</label>
      <input id="r-tagline" placeholder="Bostanc\u0131'n\u0131n Geleneksel Lezzet Dura\u011f\u0131">
      <label>A\u00e7\u0131klama</label>
      <textarea id="r-desc"></textarea>
      <div class="row">
        <div><label>Men\u00fc Butonu</label><input id="r-ctaMenu"></div>
        <div><label>Telefon Butonu</label><input id="r-ctaPhone"></div>
        <div><label>Telefon</label><input id="r-phone"></div>
        <div><label>Instagram</label><input id="r-insta"></div>
      </div>
    </div>

    <div id="categories-container"></div>

    <div class="section">
      <h2>\u00c7al\u0131\u015fma Saatleri</h2>
      <div id="hours-container"></div>
    </div>

    <div class="section">
      <h2>\u0130leti\u015fim</h2>
      <label>Adres</label>
      <textarea id="c-address"></textarea>
      <div class="row">
        <div><label>Harita Linki</label><input id="c-maps"></div>
        <div><label>Telefon</label><input id="c-phone"></div>
      </div>
    </div>

    <div class="section">
      <h2>Footer</h2>
      <label>Hakk\u0131m\u0131zda</label>
      <textarea id="f-about"></textarea>
    </div>

    <button class="btn btn-primary btn-block" onclick="save()" style="margin-top:8px;">Kaydet</button>
    <button class="btn btn-block" onclick="loadData()" style="margin-top:8px;background:#ddd;color:#333;">Verileri Yeniden Y\u00fckle</button>
  </div>

  <script>
    var API = 'https://api.github.com/repos/johnalfred2/aydogdulokanta/contents/data.json';
    var BRANCH = 'main';
    var STORE = 'aydogdu-cms-token';
    var token = localStorage.getItem(STORE);
    var currentSha = null;

    if (!token) {
      document.getElementById('login').style.display = 'block';
    } else {
      document.getElementById('editor').style.display = 'block';
      loadData();
    }

    function saveToken() {
      var t = document.getElementById('token-input').value.trim();
      if (t) { localStorage.setItem(STORE, t); window.location.reload(); }
    }

    function ghHeaders() {
      return { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' };
    }

    function status(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function loadData() {
      status('Y\u00fckleniyor...', 'info');
      try {
        var res = await fetch(API + '?ref=' + BRANCH, { headers: ghHeaders() });
        if (!res.ok) throw new Error((await res.json()).message || 'Hata');
        var json = await res.json();
        currentSha = json.sha;
        var data = JSON.parse(atob(json.content));
        populate(data);
        status('Veriler y\u00fcklendi.', 'success');
      } catch (e) {
        status('Hata: ' + e.message, 'error');
      }
    }

    function populate(data) {
      var r = data.restaurant || {};
      setVal('r-badge', r.sinceBadge);
      setVal('r-tagline', r.tagline);
      setVal('r-desc', r.description);
      setVal('r-ctaMenu', r.ctaMenu);
      setVal('r-ctaPhone', r.ctaPhone);
      setVal('r-phone', r.phone);
      setVal('r-insta', data.instagram);

      // Categories
      var catContainer = document.getElementById('categories-container');
      catContainer.innerHTML = '';
      (data.categories || []).forEach(function(cat, ci) {
        var div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = '<h2>' + escapeHtml(cat.name) + '</h2>' +
          '<div class="cat-header"><label>Ad\u0131</label><input id="cat-name-' + ci + '" value="' + escapeHtml(cat.name || '') + '">' +
          '<label>Resim</label><input id="cat-img-' + ci + '" value="' + escapeHtml(cat.image || '') + '"></div>' +
          '<div id="cat-items-' + ci + '"></div>';
        catContainer.appendChild(div);

        var itemsDiv = document.getElementById('cat-items-' + ci);
        (cat.items || []).forEach(function(item, ii) {
          var row = document.createElement('div');
          row.className = 'item-row row';
          row.innerHTML =
            '<div><label>\u00dcr\u00fcn Ad\u0131</label><input id="item-name-' + ci + '-' + ii + '" value="' + escapeHtml(item.name) + '"></div>' +
            '<div><label>A\u00e7\u0131klama</label><input id="item-desc-' + ci + '-' + ii + '" value="' + escapeHtml(item.description) + '"></div>' +
            '<div class="xs"><label>Fiyat</label><input id="item-price-' + ci + '-' + ii + '" value="' + (item.price || '') + '"></div>' +
            '<div class="sm"><label>Etiket</label><input id="item-label-' + ci + '-' + ii + '" value="' + escapeHtml(item.featuredLabel || '') + '"></div>';
          itemsDiv.appendChild(row);
        });
      });

      // Hours
      var hoursDiv = document.getElementById('hours-container');
      hoursDiv.innerHTML = '';
      (data.hours || []).forEach(function(h, hi) {
        var row = document.createElement('div');
        row.className = 'hour-row';
        row.innerHTML = '<label>' + escapeHtml(h.day) + '</label><input id="hour-' + hi + '" value="' + escapeHtml(h.hours) + '">';
        hoursDiv.appendChild(row);
      });

      // Contact
      var c = data.contact || {};
      setVal('c-address', c.address);
      setVal('c-maps', c.mapsUrl);
      setVal('c-phone', c.phone);

      // Footer
      setVal('f-about', (data.footer || {}).about);
    }

    function collect() {
      var data = {
        restaurant: {
          name: 'AYDO\u011eDU LOKANTASI',
          sinceBadge: getVal('r-badge'),
          tagline: getVal('r-tagline'),
          description: getVal('r-desc'),
          ctaMenu: getVal('r-ctaMenu'),
          ctaPhone: getVal('r-ctaPhone'),
          phone: getVal('r-phone'),
          heroVideo: './assets/video/hero.mp4'
        },
        categories: [],
        hours: [],
        contact: {
          address: getVal('c-address'),
          mapsUrl: getVal('c-maps'),
          phone: getVal('c-phone'),
          instagram: '',
          facebook: '',
          twitter: ''
        },
        footer: { about: getVal('f-about') },
        instagram: getVal('r-insta')
      };

      // Collect categories
      var ci = 0;
      while (document.getElementById('cat-name-' + ci)) {
        var cat = {
          id: ['corbalar','ana-yemek','doner','tatlilar','icecekler'][ci] || 'cat-' + ci,
          name: getVal('cat-name-' + ci),
          icon: '',
          image: getVal('cat-img-' + ci),
          items: []
        };
        var ii = 0;
        while (document.getElementById('item-name-' + ci + '-' + ii)) {
          cat.items.push({
            name: getVal('item-name-' + ci + '-' + ii),
            description: getVal('item-desc-' + ci + '-' + ii),
            price: parseInt(getVal('item-price-' + ci + '-' + ii)) || 0,
            featuredLabel: getVal('item-label-' + ci + '-' + ii)
          });
          ii++;
        }
        data.categories.push(cat);
        ci++;
      }

      // Collect hours
      var hi = 0;
      while (document.getElementById('hour-' + hi)) {
        var dayLabel = document.querySelector('#hours-container label:nth-child(' + (hi*2+1) + ')');
        data.hours.push({
          day: dayLabel ? dayLabel.textContent : 'G\u00fcn ' + (hi+1),
          hours: getVal('hour-' + hi)
        });
        hi++;
      }

      return data;
    }

    async function save() {
      status('Kaydediliyor...', 'info');
      try {
        var data = collect();
        var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        var body = JSON.stringify({ message: 'Update data.json via CMS', content: content, sha: currentSha, branch: BRANCH });
        var res = await fetch(API, { method: 'PUT', headers: Object.assign({ 'Content-Type': 'application/json' }, ghHeaders()), body: body });
        if (!res.ok) throw new Error((await res.json()).message || 'Kaydetme hatas\u0131');
        var result = await res.json();
        currentSha = result.content.sha;
        status('Kaydedildi! GitHub Pages g\u00fcncelleniyor (1-2 dk).', 'success');
      } catch (e) {
        status('Hata: ' + e.message + ' — yeniden y\u00fckleyip tekrar deneyin.', 'error');
      }
    }

    function setVal(id, v) { var el = document.getElementById(id); if (el) el.value = (v !== undefined && v !== null) ? v : ''; }
    function getVal(id) { var el = document.getElementById(id); return el ? el.value : ''; }
    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
